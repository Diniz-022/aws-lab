cd ~/aws-lab

python3 -c "
content = '''image:
  name: hashicorp/terraform:1.7
  entrypoint: [\"\"]

variables:
  AWS_ACCESS_KEY_ID: \${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: \${AWS_SECRET_ACCESS_KEY}
  AWS_DEFAULT_REGION: \${AWS_DEFAULT_REGION}
  TF_ROOT: \${CI_PROJECT_DIR}

stages:
  - validate
  - plan
  - apply

before_script:
  - terraform --version
  - terraform init

validate:
  stage: validate
  script:
    - terraform validate
  only:
    - main

plan:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
  only:
    - main

apply:
  stage: apply
  script:
    - terraform apply -auto-approve tfplan
  dependencies:
    - plan
  when: manual
  only:
    - main
'''
with open('.gitlab-ci.yml', 'w') as f:
    f.write(content)
print('Arquivo criado!')
"